<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>龙王之怒：1931年长江水灾 · 全书阅读</title>
<style>
@font-face {
  font-family: 'FZXPYZS';
  src: url('../方正屏显雅宋简体.TTF') format('truetype');
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #f5f1eb;
  font-family: 'FZXPYZS', 'PingFang SC', 'STSong', Georgia, serif;
  color: #1a1a1a;
  display: flex;
  height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 300px;
  min-width: 300px;
  background: #ffffff;
  border-right: 1px solid #e8e0d5;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  box-shadow: 1px 0 8px rgba(0,0,0,0.04);
  z-index: 10;
}

.sidebar-header {
  padding: 32px 24px 20px;
  border-bottom: 1px solid #e8e0d5;
}
.sidebar-header h1 {
  font-size: 22px;
  font-weight: 400;
  color: #1a1a1a;
  letter-spacing: 0.04em;
  line-height: 1.4;
}
.sidebar-header .subtitle {
  font-size: 12px;
  color: #888;
  margin-top: 6px;
  letter-spacing: 0.03em;
}
.sidebar-header .author {
  font-size: 12px;
  color: #bbb;
  margin-top: 4px;
}

.chapter-list {
  padding: 16px 0;
  flex: 1;
}

.chapter-link {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 24px;
  cursor: pointer;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  font-family: inherit;
  font-size: 14px;
  color: #555;
  transition: all 0.15s ease;
  border-left: 3px solid transparent;
  letter-spacing: 0.03em;
}

.chapter-link:hover {
  background: #faf8f5;
  color: #1a1a1a;
}

.chapter-link.active {
  background: #ecfeff;
  border-left-color: #0891b2;
  color: #0891b2;
  font-weight: 700;
}

.chapter-num {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
  color: #fff;
}

.chapter-link:nth-child(1) .chapter-num { background: #0891b2; }
.chapter-link:nth-child(2) .chapter-num { background: #ea580c; }
.chapter-link:nth-child(3) .chapter-num { background: #ca8a04; }
.chapter-link:nth-child(4) .chapter-num { background: #db2777; }
.chapter-link:nth-child(5) .chapter-num { background: #4f46e5; }
.chapter-link:nth-child(6) .chapter-num { background: #dc2626; }

.chapter-info { flex: 1; min-width: 0; }
.chapter-name { font-size: 14px; line-height: 1.3; }
.chapter-meta { font-size: 11px; color: #bbb; margin-top: 2px; }

.sidebar-footer {
  padding: 16px 24px;
  border-top: 1px solid #e8e0d5;
  font-size: 11px;
  color: #ccc;
  letter-spacing: 0.03em;
}
.sidebar-footer a { color: #bbb; text-decoration: none; }
.sidebar-footer a:hover { color: #888; }

/* ===== MAIN CONTENT ===== */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: #f5f1eb;
}

/* top bar */
.top-bar {
  padding: 12px 24px;
  background: #ffffff;
  border-bottom: 1px solid #e8e0d5;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 13px;
  color: #888;
}
.top-bar .current-title {
  font-weight: 700;
  color: #1a1a1a;
}
.top-bar .actions {
  display: flex;
  gap: 8px;
}
.top-bar .actions a {
  display: inline-block;
  padding: 5px 12px;
  border-radius: 6px;
  font-size: 12px;
  text-decoration: none;
  letter-spacing: 0.02em;
  font-family: inherit;
  transition: opacity 0.15s;
}
.top-bar .actions a:hover { opacity: 0.75; }
.btn-en {
  background: #eef2ff;
  color: #4f46e5;
  border: 1px solid #c7d2fe;
}
.btn-zh {
  background: #fef2f2;
  color: #dc2626;
  border: 1px solid #fecaca;
}

.content-frame {
  flex: 1;
  border: none;
  width: 100%;
  background: #f5f1eb;
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {
  body { flex-direction: column; }
  .sidebar {
    width: 100%;
    min-width: 100%;
    max-height: 40vh;
    flex-shrink: 0;
  }
  .sidebar-header { padding: 20px 16px 14px; }
  .sidebar-header h1 { font-size: 18px; }
  .chapter-link { padding: 10px 16px; }
  .top-bar { padding: 10px 16px; }
  .content-frame { min-height: 60vh; }
}
</style>
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">
  <div class="sidebar-header">
    <h1>龙王之怒</h1>
    <div class="subtitle">1931年长江水灾 · 全书阅读</div>
    <div class="author">陈学仁 (Chris Courtney) · 剑桥大学出版社 2018</div>
  </div>

  <div class="chapter-list">
    <button class="chapter-link active" data-chapter="ch1" onclick="loadChapter('ch1', this)">
      <div class="chapter-num">一</div>
      <div class="chapter-info">
        <div class="chapter-name">长江</div>
        <div class="chapter-meta">洪水如何从自然现象演变为人类灾难</div>
      </div>
    </button>

    <button class="chapter-link" data-chapter="ch2" onclick="loadChapter('ch2', this)">
      <div class="chapter-num">二</div>
      <div class="chapter-info">
        <div class="chapter-name">洪水脉冲</div>
        <div class="chapter-meta">1931年洪水的生态动力学</div>
      </div>
    </button>

    <button class="chapter-link" data-chapter="ch3" onclick="loadChapter('ch3', this)">
      <div class="chapter-num">三</div>
      <div class="chapter-info">
        <div class="chapter-name">龙王</div>
        <div class="chapter-meta">民间信仰、现代性与灾难的文化解释</div>
      </div>
    </button>

    <button class="chapter-link" data-chapter="ch4" onclick="loadChapter('ch4', this)">
      <div class="chapter-num">四</div>
      <div class="chapter-info">
        <div class="chapter-name">灾感</div>
        <div class="chapter-meta">感官、情感与灾难的身体体验</div>
      </div>
    </button>

    <button class="chapter-link" data-chapter="ch5" onclick="loadChapter('ch5', this)">
      <div class="chapter-num">五</div>
      <div class="chapter-info">
        <div class="chapter-name">灾害专家</div>
        <div class="chapter-meta">精英知识与灾民生存逻辑的断裂</div>
      </div>
    </button>

    <button class="chapter-link" data-chapter="ch6" onclick="loadChapter('ch6', this)">
      <div class="chapter-num">六</div>
      <div class="chapter-info">
        <div class="chapter-name">流民</div>
        <div class="chapter-meta">难民危机与军事化人道主义</div>
      </div>
    </button>
  </div>

  <div class="sidebar-footer">
    中英双语 · 方正屏显雅宋 · <a target="_blank" href="目录.html">目录</a>
  </div>
</div>

<!-- ===== MAIN ===== -->
<div class="main">
  <div class="top-bar">
    <span class="current-title" id="current-title">第一章：长江 —— 洪水如何从自然现象演变为人祸</span>
    <div class="actions">
      <a class="btn-zh" id="btn-zh" target="_blank" href="longwang-ch001-info-zh.html">在新标签打开中文版</a>
      <a class="btn-en" id="btn-en" target="_blank" href="longwang-ch001-info-en.html">EN</a>
    </div>
  </div>
  <iframe class="content-frame" id="content-frame" src="longwang-ch001-info-zh.html" title="Chapter Content"></iframe>
</div>

<script>
function loadChapter(ch, btn) {
  // Update active state
  document.querySelectorAll('.chapter-link').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // Update iframe
  const frame = document.getElementById('content-frame');
  frame.src = 'longwang-' + ch + '-info-zh.html';

  // Update top bar
  const titles = {
    ch1: '第一章：长江 —— 洪水如何从自然现象演变为人祸',
    ch2: '第二章：洪水脉冲 —— 1931年洪水的生态动力学',
    ch3: '第三章：龙王 —— 民间信仰、现代性与灾难的文化解释',
    ch4: '第四章：灾感 —— 感官、情感与灾难的身体体验',
    ch5: '第五章：灾害专家 —— 精英知识与灾民生存逻辑的断裂',
    ch6: '第六章：流民 —— 难民危机与军事化人道主义'
  };
  document.getElementById('current-title').textContent = titles[ch];

  // Update links
  document.getElementById('btn-zh').href = 'longwang-' + ch + '-info-zh.html';
  document.getElementById('btn-en').href = 'longwang-' + ch + '-info-en.html';
}
</script>
</body>
</html>
